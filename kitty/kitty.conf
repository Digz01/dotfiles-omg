shell zsh
font_size 11.3
window_padding_width 5
scrollback_lines 10000
scrollback_pager_history_size 20
clipboard_control write-clipboard write-primary read-clipboard read-primary
paste_actions no-op


# tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_bar_min_tabs 1

# font_family      Fira Code Nerd Font
# italic_font      auto
shell_integration no-cursor
# bold_font        JetBrainsMono Nerd Font
# bold_italic_font auto
# include theme.conf
background_opacity 1
hide_window_decorations no
confirm_os_window_close 0
cursor_shape beam
cursor_trail 1
cursor_trail_decay 0.1 0.15

# Theming
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto

# layout
enabled_layouts splits,tall:bias=62;full_size=0;mirrored=false
draw_minimal_borders yes
window_border_width 0.2pt

map ctrl+shift+enter launch --location=hsplit --cwd=current
map ctrl+shift+\ launch --location=vsplit --cwd=current

# mappings
map alt+shift+h neighboring_window left
map alt+shift+l neighboring_window right
map alt+shift+k neighboring_window up
map alt+shift+j neighboring_window down

map alt+shift+right resize_window narrower
map alt+shift+left resize_window wider
map alt+shift+up resize_window taller
map alt+shift+down resize_window shorter

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9




# BEGIN_KITTY_THEME
# One Half Dark
include current-theme.conf
# END_KITTY_THEME
